version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: goblog-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: goblog
      MYSQL_USER: goblog
      MYSQL_PASSWORD: goblog123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - goblog-network

  goblog:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: goblog-app
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=goblog
      - DB_PASSWORD=goblog123
      - DB_NAME=goblog
    depends_on:
      - mysql
    volumes:
      - ./config.yaml:/app/config.yaml
      - upload_data:/app/uploads
      - backup_data:/app/backups
    networks:
      - goblog-network

volumes:
  mysql_data:
  upload_data:
  backup_data:

networks:
  goblog-network:
    driver: bridge
